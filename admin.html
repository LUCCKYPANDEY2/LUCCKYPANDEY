<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE // Command Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { background: '#020202', surface: '#0a0a0a', amber: '#F59E0B', green: '#4ADE80', matrix: '#00FF41', border: 'rgba(255, 255, 255, 0.1)' },
                    fontFamily: { outfit: ['Outfit', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #020202; color: #FFFFFF; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        ::selection { background-color: #F59E0B; color: #000000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        /* Matrix Hacker Mode CSS */
        .matrix-mode { color: #00FF41 !important; text-shadow: 0 0 4px rgba(0,255,65,0.4); }
        .matrix-mode .panel-border { border-color: #00FF41 !important; background-color: rgba(0,255,65,0.02) !important; box-shadow: inset 0 0 10px rgba(0,255,65,0.05); }
        .matrix-mode .accent-text { color: #00FF41 !important; }
        .matrix-mode .accent-bg { background-color: #00FF41 !important; color: #000 !important; text-shadow: none; }
        
        /* CRT Scanline overlay */
        .scanlines { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 6px 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        function AdminPanel() {
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [matrixMode, setMatrixMode] = React.useState(false);
            const [uploadStatus, setUploadStatus] = React.useState('IDLE');
            const [messages, setMessages] = React.useState([]);
            const [terminalLogs, setTerminalLogs] = React.useState(["[INIT] Secure boot sequence starting...", "[SYS] Loading core kernel modules..."]);

            // Icon & Message Init
            React.useEffect(() => { 
                lucide.createIcons(); 
                if (isLoggedIn) {
                    const saved = JSON.parse(localStorage.getItem('see_messages') || '[]');
                    setMessages(saved);
                }
            }, [isLoggedIn, matrixMode, uploadStatus, messages]);

            // Fake Terminal Hacker Scroll
            React.useEffect(() => {
                if (!isLoggedIn) return;
                const phrases = [
                    "[NET] Encrypted tunnel established securely.", "[AUTH] Invalid ping dropped from port 443.",
                    "[PROC] Compiling payload binaries...", "[MEM] Honeypot memory block allocated.",
                    "[SYS] Rootkit defense grid active.", "[DATA] Kiosk #04 telemetry received.",
                    "[WARN] Bypassing firewall heuristics...", "[INFO] Matrix protocols engaged."
                ];
                const interval = setInterval(() => {
                    setTerminalLogs(prev => {
                        const newLogs = [...prev, phrases[Math.floor(Math.random() * phrases.length)]];
                        return newLogs.length > 12 ? newLogs.slice(newLogs.length - 12) : newLogs;
                    });
                }, 1200);
                return () => clearInterval(interval);
            }, [isLoggedIn]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'lucckypandey' && password === 'Lxu@899') setIsLoggedIn(true);
                else alert('ACCESS DENIED: Invalid credentials.');
            };

            const handleDeleteMsg = (id) => {
                const updated = messages.filter(m => m.id !== id);
                setMessages(updated);
                localStorage.setItem('see_messages', JSON.stringify(updated));
            };

            const handleUpload = () => {
                setUploadStatus('UPLOADING');
                setTimeout(() => { setUploadStatus('SUCCESS'); setTimeout(() => setUploadStatus('IDLE'), 3000); }, 2000);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5')] bg-cover bg-center bg-blend-overlay bg-black/90">
                        <div className="bg-surface border border-border p-8 w-full max-w-md shadow-2xl relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-amber"></div>
                            <div className="flex justify-center mb-8">
                                <div className="w-16 h-16 bg-black border border-border flex items-center justify-center text-2xl font-bold text-amber shadow-[0_0_15px_rgba(245,158,11,0.2)]">LP</div>
                            </div>
                            <h2 className="text-center text-xl font-outfit font-bold tracking-widest mb-6">SECURE TERMINAL ACCESS</h2>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="text-[10px] text-white/50 mb-1 block">USERNAME</label>
                                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full bg-black border border-border px-4 py-3 text-sm focus:outline-none focus:border-amber transition-colors" required />
                                </div>
                                <div>
                                    <label className="text-[10px] text-white/50 mb-1 block">PASSWORD</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-black border border-border px-4 py-3 text-sm focus:outline-none focus:border-amber transition-colors" required />
                                </div>
                                <button type="submit" className="w-full bg-amber text-black font-bold py-3 text-sm mt-4 hover:bg-white transition-colors uppercase tracking-widest">
                                    Authenticate
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }
                                  return (
                <div className={`min-h-screen ${matrixMode ? 'matrix-mode bg-black' : ''}`}>
                    {matrixMode && <div className="scanlines"></div>}
                    
                    {/* Top Nav */}
                    <nav className="border-b panel-border border-border bg-surface px-6 py-4 flex justify-between items-center relative z-10">
                        <div className="flex items-center gap-4">
                            <div className="accent-text text-amber font-bold text-xl tracking-widest">SEE</div>
                            <div className="text-[10px] text-white/40 tracking-widest hidden md:block">// JARVIS COMMAND CENTER</div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMatrixMode(!matrixMode)} className="text-[10px] border panel-border border-border px-4 py-2 hover:bg-white hover:text-black transition-colors font-bold flex items-center gap-2">
                                <i data-lucide="cpu" className="w-3 h-3"></i> {matrixMode ? 'DISABLE MATRIX' : 'START MATRIX'}
                            </button>
                            <button onClick={() => setIsLoggedIn(false)} className="text-[10px] border panel-border border-border px-4 py-2 hover:bg-red-500 hover:text-white transition-colors">
                                EXIT
                            </button>
                        </div>
                    </nav>

                    {/* Dashboard 6-Grid */}
                    <div className="max-w-[1400px] mx-auto p-4 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 relative z-10">
                        
                        {/* WIDGET 1: SECURE INBOX */}
                        <div className="lg:col-span-2 bg-surface panel-border border border-border p-4 h-[350px] flex flex-col">
                            <div className="flex items-center gap-2 mb-4 border-b border-border pb-2 panel-border">
                                <i data-lucide="inbox" className="w-4 h-4 accent-text text-amber"></i>
                                <h3 className="text-xs font-bold tracking-widest">INCOMING TRANSMISSIONS ({messages.length})</h3>
                            </div>
                            <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                {messages.length === 0 ? (
                                    <div className="text-xs text-white/30 italic flex h-full items-center justify-center">No unread transmissions.</div>
                                ) : (
                                    messages.map(msg => (
                                        <div key={msg.id} className="border panel-border border-border p-3 bg-black/50 relative group">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <div className="text-xs font-bold accent-text text-amber">{msg.name}</div>
                                                    <div className="text-[10px] text-white/50">{msg.context}</div>
                                                </div>
                                                <button onClick={() => handleDeleteMsg(msg.id)} className="text-[10px] bg-red-900/30 text-red-500 px-2 py-1 hover:bg-red-500 hover:text-white transition-colors border border-red-500/30">DELETE</button>
                                            </div>
                                            <p className="text-xs text-white/80 leading-relaxed border-l-2 border-border pl-2 panel-border">{msg.text}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* WIDGET 2: FAKE TERMINAL */}
                        <div className="bg-surface panel-border border border-border p-4 h-[350px] flex flex-col">
                            <div className="flex items-center justify-between mb-4 border-b border-border pb-2 panel-border">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="terminal" className="w-4 h-4 accent-text text-amber"></i>
                                    <h3 className="text-xs font-bold tracking-widest">LIVE FEED</h3>
                                </div>
                                <div className="w-2 h-2 rounded-full bg-green animate-pulse"></div>
                            </div>
                            <div className="flex-1 overflow-hidden bg-black p-3 border border-border panel-border text-[10px] text-white/60 space-y-1">
                                {terminalLogs.map((log, i) => (
                                    <div key={i} className={`${log.includes('[WARN]') ? 'text-amber accent-text' : ''}`}>{log}</div>
                                ))}
                                <div className="animate-pulse">_</div>
                            </div>
                        </div>

                        {/* WIDGET 3: PAYLOAD DEPLOYMENT */}
                        <div className="bg-surface panel-border border border-border p-4 h-[250px] flex flex-col">
                            <div className="flex items-center gap-2 mb-4 border-b border-border pb-2 panel-border">
                                <i data-lucide="upload-cloud" className="w-4 h-4 accent-text text-amber"></i>
                                <h3 className="text-xs font-bold tracking-widest">PAYLOAD UPLINK</h3>
                            </div>
                            <div onClick={handleUpload} className="flex-1 border-2 border-dashed border-border panel-border flex flex-col items-center justify-center text-center bg-black/50 hover:bg-white/5 transition-colors cursor-pointer mb-2">
                                <i data-lucide="file-key" className={`w-8 h-8 mb-2 ${uploadStatus === 'UPLOADING' ? 'animate-bounce accent-text text-amber' : 'text-white/20'}`}></i>
                                <p className="text-xs font-bold">{uploadStatus === 'UPLOADING' ? 'SYNCING...' : 'SELECT .ENC FILE'}</p>
                            </div>
                            <div className="text-[10px] text-center text-white/50 h-4">
                                {uploadStatus === 'SUCCESS' && <span className="text-green accent-text">UPLOAD COMPLETE.</span>}
                            </div>
                        </div>

                        {/* WIDGET 4: ATMOSPHERIC TELEMETRY (WEATHER) */}
                        <div className="bg-surface panel-border border border-border p-4 h-[250px]">
                            <div className="flex items-center gap-2 mb-6 border-b border-border pb-2 panel-border">
                                <i data-lucide="cloud-rain" className="w-4 h-4 accent-text text-amber"></i>
                                <h3 className="text-xs font-bold tracking-widest">ENVIRONMENT</h3>
                            </div>
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <div className="text-[10px] text-white/40">LOC: CHANDIGARH, IN</div>
                                    <div className="text-4xl font-outfit font-bold accent-text text-amber">24°C</div>
                                </div>
                                <i data-lucide="cloud-lightning" className="w-12 h-12 text-white/20"></i>
                            </div>
                            <div className="grid grid-cols-2 gap-2 text-[10px]">
                                <div className="bg-black border border-border panel-border p-2">HUMIDITY: 65%</div>
                                <div className="bg-black border border-border panel-border p-2">WIND: 12 KM/H</div>
                            </div>
                        </div>

                        {/* WIDGET 5 & 6: SYSTEM STATS & DIAGNOSTICS */}
                        <div className="bg-surface panel-border border border-border p-4 h-[250px] flex flex-col justify-between">
                            <div className="flex items-center gap-2 mb-4 border-b border-border pb-2 panel-border">
                                <i data-lucide="activity" className="w-4 h-4 accent-text text-amber"></i>
                                <h3 className="text-xs font-bold tracking-widest">DIAGNOSTICS</h3>
                            </div>
                            <div className="grid grid-cols-2 gap-4 flex-1">
                                <div className="bg-black border border-border panel-border p-3 flex flex-col justify-center items-center text-center">
                                    <div className="text-2xl font-bold accent-text text-amber mb-1">04</div>
                                    <div className="text-[9px] text-white/40">ACTIVE NODES</div>
                                </div>
                                <div className="bg-black border border-border panel-border p-3 flex flex-col justify-center items-center text-center">
                                    <div className="text-2xl font-bold accent-text text-amber mb-1">12<span className="text-[10px]">ms</span></div>
                                    <div className="text-[9px] text-white/40">LATENCY</div>
                                </div>
                                <div className="bg-black border border-border panel-border p-3 flex flex-col justify-center items-center text-center col-span-2">
                                    <div className="w-full bg-white/10 h-1 mb-2"><div className="bg-green h-full w-[15%]"></div></div>
                                    <div className="text-[9px] text-white/40 flex justify-between w-full"><span>CPU LOAD</span><span>15%</span></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>
</html>
